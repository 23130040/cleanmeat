version: '3.8'

services:
  db:
    image: mysql:8.4
    container_name: cleanmeat-db
    restart: always
    environment:
      MYSQL_DATABASE: cleanmeat
      MYSQL_ROOT_PASSWORD: 123456
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: cleanmeat-web
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: